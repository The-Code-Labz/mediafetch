services:
  mediafetch:
    image: ghcr.io/the-code-labz/mediafetch:latest
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./downloads:/data/downloads
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      - PORT=${PORT}
      - AUTH_USER=${AUTH_USER}
      - AUTH_PASS=${AUTH_PASS}
      - YTDLP_EXTRA_ARGS=--cookies /app/cookies.txt
    env_file:
      - .env